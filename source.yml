# source.yml — repo-level metadata (this whole file is optional).
# When absent, Ludus auto-derives name from the URL and homepage from the git remote.

manifest_version: 1                                # required — schema version, leave as 1
name: "My Blueprint Source"                        # optional — display name in `ludus blueprint source list`
description: "Short tagline"                       # optional
maintainer: "you@example.com"                      # optional — contact for questions
homepage: https://github.com/you/repo              # optional — falls back to the git URL
